name: Lint & Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-stan:
    name: PHP ${{ matrix.php }} – Laravel ${{ matrix.laravel }} (stable)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3']
        laravel: ['12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl
          coverage: none

      - name: Set Laravel constraint
        run: composer require "illuminate/cache:^${{ matrix.laravel }}.0" "illuminate/contracts:^${{ matrix.laravel }}.0" "illuminate/support:^${{ matrix.laravel }}.0" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Check code style (Rector)
        run: composer test:lint

      - name: Static analysis (PHPStan)
        run: composer test:types
